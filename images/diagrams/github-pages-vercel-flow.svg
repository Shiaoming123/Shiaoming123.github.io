<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">GitHub Pages and Vercel deployment paths</title>
  <desc id="desc">A comparison diagram showing static dist deployment to GitHub Pages and git driven application deployment to Vercel.</desc>
  <rect width="1200" height="620" rx="28" fill="#f8fafc"/>
  <text x="64" y="70" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">部署路径对比</text>
  <text x="64" y="110" font-family="Arial, sans-serif" font-size="18" fill="#475569">GitHub Pages 更像静态发布仓，Vercel 更像前端应用平台。</text>
  <g transform="translate(70 160)">
    <rect width="490" height="350" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="28" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#0f766e">GitHub Pages</text>
    <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
      <rect x="38" y="92" width="170" height="54" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="72" y="126">源码仓</text>
      <rect x="280" y="92" width="170" height="54" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="318" y="126">本地构建</text>
      <rect x="38" y="210" width="170" height="54" rx="12" fill="#ecfeff" stroke="#67e8f9"/>
      <text x="72" y="244">dist 产物</text>
      <rect x="280" y="210" width="170" height="54" rx="12" fill="#ccfbf1" stroke="#14b8a6"/>
      <text x="302" y="244">Pages 发布仓</text>
    </g>
    <path d="M215 119h58M365 152v52M208 237h65" stroke="#0f766e" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="38" y="314" font-family="Arial, sans-serif" font-size="16" fill="#64748b">优点：链路简单、产物可审查、URL 稳定。</text>
  </g>
  <g transform="translate(640 160)">
    <rect width="490" height="350" rx="18" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="28" y="46" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#7c3aed">Vercel</text>
    <g font-family="Arial, sans-serif" font-size="18" fill="#334155">
      <rect x="38" y="92" width="170" height="54" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
      <text x="72" y="126">Git 推送</text>
      <rect x="280" y="92" width="170" height="54" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
      <text x="314" y="126">自动构建</text>
      <rect x="38" y="210" width="170" height="54" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
      <text x="72" y="244">Preview</text>
      <rect x="280" y="210" width="170" height="54" rx="12" fill="#ede9fe" stroke="#8b5cf6"/>
      <text x="318" y="244">Production</text>
    </g>
    <path d="M215 119h58M365 152v52M208 237h65" stroke="#7c3aed" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
    <text x="38" y="314" font-family="Arial, sans-serif" font-size="16" fill="#64748b">优点：预览、回滚、Serverless、环境变量。</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
