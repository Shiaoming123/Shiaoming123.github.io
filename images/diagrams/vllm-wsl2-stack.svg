<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">vLLM on Windows via WSL2 stack</title>
  <desc id="desc">The stack for running vLLM on Windows using WSL2, CUDA, Python, and OpenAI compatible API.</desc>
  <rect width="1200" height="620" rx="28" fill="#f8fafc"/>
  <text x="70" y="76" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">Windows + WSL2 + vLLM 部署栈</text>
  <g font-family="Arial, sans-serif">
    <rect x="120" y="150" width="960" height="390" rx="24" fill="#ffffff" stroke="#cbd5e1"/>
    <rect x="170" y="210" width="860" height="70" rx="14" fill="#dbeafe" stroke="#60a5fa"/>
    <text x="210" y="255" font-size="24" font-weight="700" fill="#1e3a8a">Windows 宿主机：NVIDIA 驱动、模型文件、客户端</text>
    <rect x="220" y="320" width="760" height="70" rx="14" fill="#ecfdf5" stroke="#34d399"/>
    <text x="260" y="365" font-size="24" font-weight="700" fill="#065f46">WSL2 Ubuntu：CUDA、Python、vLLM</text>
    <rect x="300" y="430" width="600" height="70" rx="14" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="350" y="475" font-size="24" font-weight="700" fill="#92400e">OpenAI Compatible API：localhost:8000</text>
  </g>
  <path d="M600 285v30M600 395v30" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
  </defs>
</svg>
