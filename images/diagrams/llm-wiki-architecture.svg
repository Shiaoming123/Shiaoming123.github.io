<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">LLM Wiki architecture</title>
  <desc id="desc">A layered architecture of raw sources, maintained wiki pages, and agent rules.</desc>
  <rect width="1200" height="620" rx="28" fill="#f9fafb"/>
  <text x="70" y="72" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#111827">LLM Wiki 三层结构</text>
  <text x="70" y="112" font-family="Arial, sans-serif" font-size="18" fill="#4b5563">把模型放进知识维护流程，而不是只把资料塞进一次性对话。</text>
  <g font-family="Arial, sans-serif">
    <rect x="130" y="170" width="940" height="110" rx="18" fill="#fff7ed" stroke="#fb923c"/>
    <text x="170" y="215" font-size="28" font-weight="700" fill="#9a3412">raw/ 原始资料</text>
    <text x="170" y="250" font-size="18" fill="#7c2d12">文章、论文、截图、访谈、项目记录。只读，作为事实来源。</text>
    <rect x="130" y="320" width="940" height="110" rx="18" fill="#ecfdf5" stroke="#34d399"/>
    <text x="170" y="365" font-size="28" font-weight="700" fill="#065f46">wiki/ 结构化知识</text>
    <text x="170" y="400" font-size="18" fill="#064e3b">概念页、来源摘要、索引页、对比页。由 LLM 持续整理。</text>
    <rect x="130" y="470" width="940" height="90" rx="18" fill="#eef2ff" stroke="#818cf8"/>
    <text x="170" y="525" font-size="28" font-weight="700" fill="#3730a3">AGENTS.md / 规则</text>
    <text x="500" y="525" font-size="18" fill="#4338ca">约束目录、frontmatter、引用、lint 和发布边界。</text>
  </g>
</svg>
