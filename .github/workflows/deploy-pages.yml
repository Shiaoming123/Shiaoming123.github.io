name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout publish repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: package
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deploy_primary
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Retry Pages deploy once
        id: deploy_retry
        if: steps.deploy_primary.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Fail if both deploy attempts failed
        if: steps.deploy_primary.outcome == 'failure' && steps.deploy_retry.outcome == 'failure'
        run: |
          echo "Both GitHub Pages deploy attempts failed."
          exit 1
